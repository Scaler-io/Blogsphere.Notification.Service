name: pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.100"
  BUILD_CONFIGURATION: "Release"
  PROJECT_PATH: "src/Blogsphere.Notification.Service/Blogsphere.Notification.Service.csproj"
  BUILD_PLATFORM: "Any CPU"
  BUILD_OUTPUT_DIR: "build-output"
  ANALYSIS_REPORT: "code-analysis-report.csv"
  DOCKERFILE_PATH: "src/Blogsphere.Notification.Service/Dockerfile"
  DOCKER_CONTEXT: "src"

jobs:
  build:
    name: Build
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/build.yml
    with:
      dotnet_version: ${{ env.DOTNET_VERSION }}
      configuration: ${{ env.BUILD_CONFIGURATION }}
      project_path: ${{ env.PROJECT_PATH }}
      build_platform: ${{ env.BUILD_PLATFORM }}
      output_dir: ${{ env.BUILD_OUTPUT_DIR }}

  code_analysis:
    name: Code Analysis
    needs: [build]
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/code-analysis.yml
    with:
      dotnet_version: ${{ env.DOTNET_VERSION }}
      configuration: ${{ env.BUILD_CONFIGURATION }}
      build_output_dir: ${{ env.BUILD_OUTPUT_DIR }}
      analysis_report: ${{ env.ANALYSIS_REPORT }}

  github_release:
    name: GitHub Release
    needs: [code_analysis]
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    permissions:
      contents: write
    uses: ./.github/workflows/github-release.yml

  docker_build_push:
    name: Docker Build & Push
    needs: [github_release]
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    uses: ./.github/workflows/docker-build-push.yml
    with:
      image_name: ${{ vars.IMAGE_NAME }}
      tag: ${{ needs.github_release.outputs.release_tag }}
      dockerfile_path: ${{ env.DOCKERFILE_PATH }}
      context: ${{ env.DOCKER_CONTEXT }}
      registry: ${{ vars.DOCKER_REGISTRY || 'docker.io' }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
